<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4f46e5">
  <title>离线模式 - 个人记账本</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #1e293b;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
    }

    .card {
      width: 100%;
      max-width: 420px;
      padding: 32px 24px;
      text-align: center;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(79, 70, 229, 0.14);
    }

    .icon {
      width: 84px;
      height: 84px;
      margin: 0 auto 20px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      font-size: 42px;
      background: #eef2ff;
    }

    h1 {
      margin-bottom: 12px;
      font-size: 24px;
    }

    p {
      margin-bottom: 24px;
      color: #64748b;
      line-height: 1.7;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 20px;
      border-radius: 12px;
      color: #ffffff;
      background: #4f46e5;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon">💰</div>
    <h1>当前处于离线状态</h1>
    <p>应用外壳已经缓存，可以从手机桌面打开；新增、编辑和同步记账数据需要恢复网络后继续使用。</p>
    <a href="/">返回记账本</a>
  </main>
</body>
</html>
